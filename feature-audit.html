<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Feature Audit — vMix Layer Control v3.1.3</title>
<style>
  :root {
    --bg: #0e1020;
    --panel: #15182e;
    --panel-2: #1b1f3a;
    --border: #2a2f55;
    --fg: #e9ebff;
    --fg-dim: #8b8fb6;
    --accent: #ff9500;
    --accent-dim: #ff95002e;
    --danger: #ff4060;
    --danger-dim: #ff406022;
    --keep: #35c758;
    --keep-dim: #35c75825;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; font-size: 14px; }
  body { padding: 120px 24px 32px; max-width: 1100px; margin: 0 auto; }
  header.top {
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 14px 24px; z-index: 100;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between;
  }
  header.top h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
  header.top h1 span { color: var(--accent); }
  .counters { display: flex; gap: 14px; font-size: 12px; }
  .counters span { padding: 4px 10px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border); }
  .counters .c-keep { color: var(--keep); border-color: var(--keep-dim); }
  .counters .c-remove { color: var(--danger); border-color: var(--danger-dim); }
  .btns { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    transition: background 0.12s, border-color 0.12s;
  }
  button:hover { background: #242850; }
  button.primary { background: var(--accent); color: #0e1020; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: #ffa526; }
  button.ghost { background: transparent; }
  details.group {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 14px; overflow: hidden;
  }
  details.group[open] { border-color: #394073; }
  summary.group-head {
    padding: 14px 18px; cursor: pointer; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    user-select: none;
  }
  summary.group-head::marker, summary.group-head::-webkit-details-marker { display: none; }
  summary.group-head::before { content: '▸'; margin-right: 8px; color: var(--fg-dim); transition: transform 0.15s; display: inline-block; }
  details[open] > summary.group-head::before { transform: rotate(90deg); }
  .group-meta { font-size: 11px; color: var(--fg-dim); font-weight: 400; }
  .group-actions { display: flex; gap: 6px; }
  .group-actions button { font-size: 11px; padding: 3px 8px; }
  .feature-list { padding: 0 18px 14px; display: grid; grid-template-columns: 1fr; gap: 6px; }
  .feature {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; display: grid; grid-template-columns: auto 1fr auto; gap: 10px;
    align-items: start; transition: opacity 0.15s, background 0.15s;
  }
  .feature.to-remove { background: var(--danger-dim); border-color: var(--danger); }
  .feature.to-remove .f-name { text-decoration: line-through; opacity: 0.6; }
  .feature input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--keep); cursor: pointer; margin-top: 2px; }
  .feature.to-remove input[type=checkbox] { accent-color: var(--danger); }
  .f-body { min-width: 0; }
  .f-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .f-name-en { font-weight: 400; font-size: 11px; color: #7a7faf; margin-bottom: 4px; font-style: italic; }
  .f-desc { font-size: 12px; color: var(--fg-dim); line-height: 1.45; }
  .f-desc-en { font-size: 11px; color: #6c6f94; line-height: 1.45; margin-top: 3px; font-style: italic; }
  .f-id { font-size: 10px; color: #5c608a; font-family: Consolas, monospace; margin-top: 4px; }
  .group-head .name-en { font-weight: 400; font-size: 12px; color: #7a7faf; font-style: italic; margin-left: 8px; }
  .f-meta { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
  .f-meta summary { cursor: pointer; font-size: 11px; color: var(--accent); user-select: none; }
  .f-meta summary::-webkit-details-marker { display: none; }
  .f-meta-content { padding: 6px 0 0 6px; font-size: 11px; color: var(--fg-dim); font-family: Consolas, monospace; line-height: 1.6; }
  .f-meta-content .label { color: #7a7faf; }
  .f-meta-content code { color: #ffa526; }
  .f-flag {
    font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--keep-dim); color: var(--keep);
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .feature.to-remove .f-flag { background: var(--danger-dim); color: var(--danger); }
  .feature.to-remove .f-flag::before { content: '✕ '; }
  .feature:not(.to-remove) .f-flag::before { content: '✓ '; }
  footer.bottom {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--panel); border-top: 1px solid var(--border);
    padding: 12px 24px; z-index: 100;
    display: flex; gap: 10px; align-items: center; justify-content: center;
  }
  body { padding-bottom: 80px; }
  #exportModal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
    align-items: center; justify-content: center; padding: 40px;
  }
  #exportModal.open { display: flex; }
  #exportModal .box {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    width: 100%; max-width: 820px; max-height: 90vh; display: flex; flex-direction: column;
  }
  #exportModal header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  #exportModal header h2 { margin: 0; font-size: 16px; }
  #exportModal textarea {
    flex: 1; border: none; background: #0a0d1c; color: var(--fg);
    padding: 16px; font-family: Consolas, monospace; font-size: 12px; line-height: 1.5;
    resize: none; outline: none; min-height: 300px;
  }
  #exportModal footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--keep); color: #0e1020; padding: 10px 18px; border-radius: 8px;
    font-weight: 600; font-size: 13px; z-index: 300; opacity: 0;
    transition: opacity 0.2s, transform 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .warn-banner {
    background: var(--danger-dim); border: 1px solid var(--danger); color: #ffb3c0;
    padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 12px; line-height: 1.5;
    display: none;
  }
  .warn-banner.show { display: block; }
  .warn-banner strong { color: var(--danger); }
  @media (max-width: 700px) {
    body { padding: 180px 12px 100px; }
    header.top { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header class="top">
  <div style="display:flex;flex-direction:column;gap:4px;">
    <h1>Feature Audit — <span>vMix Layer Control</span> v3.1.3</h1>
    <div style="font-size:11px;color:var(--fg-dim);">Marque ✓ para <b style="color:var(--keep)">manter</b>, desmarque para <b style="color:var(--danger)">remover</b>. Exporte o JSON ao final.</div>
  </div>
  <div class="counters">
    <span id="cTotal">Total: 0</span>
    <span class="c-keep" id="cKeep">Manter: 0</span>
    <span class="c-remove" id="cRemove">Remover: 0</span>
  </div>
  <div class="btns">
    <button onclick="toggleAll(true)">Marcar todos</button>
    <button onclick="toggleAll(false)">Desmarcar todos</button>
    <button onclick="expandAll(true)">Expandir grupos</button>
    <button onclick="expandAll(false)">Recolher grupos</button>
  </div>
</header>

<div id="warnBanner" class="warn-banner"></div>
<div id="content"></div>

<footer class="bottom">
  <button class="primary" onclick="openExport()">Exportar JSON →</button>
  <button class="ghost" onclick="location.reload()">Resetar</button>
</footer>

<div id="exportModal">
  <div class="box">
    <header>
      <h2>JSON para Claude</h2>
      <button onclick="closeExport()">✕</button>
    </header>
    <textarea id="exportJson" readonly></textarea>
    <footer>
      <button onclick="copyExport()">Copiar</button>
      <button class="primary" onclick="downloadExport()">Baixar .json</button>
    </footer>
  </div>
</div>

<div id="toast" class="toast"></div>

// === ESTADO ===
const state = {};
INVENTORY.groups.forEach(g => g.features.forEach(f => { state[f.id] = true; }));

// === RENDER ===
function render() {
  const root = document.getElementById('content');
  root.innerHTML = INVENTORY.groups.map(g => `
    <details class="group" open data-group="${escapeAttr(g.name)}">
      <summary class="group-head">
        <span>
          <span>${escapeHtml(g.name_pt || g.name)}</span>
          ${g.name_pt && g.name_pt !== g.name ? `<span class="name-en">${escapeHtml(g.name)}</span>` : ''}
          <span class="group-meta" id="gMeta-${slug(g.name)}"> · ${g.features.length} features</span>
        </span>
        <span class="group-actions" onclick="event.preventDefault();event.stopPropagation();">
          <button onclick="toggleGroup('${slug(g.name)}', true)">Todos</button>
          <button onclick="toggleGroup('${slug(g.name)}', false)">Nenhum</button>
        </span>
      </summary>
      <div class="feature-list" data-slug="${slug(g.name)}">
        ${g.features.map(f => renderFeature(f)).join('')}
      </div>
    </details>
  `).join('');
  updateCounters();
}

function renderFeature(f) {
  const files = (f.files || []).map(x => `<code>${escapeHtml(x)}</code>`).join(', ');
  const entries = (f.entry_points || []).map(x => `<code>${escapeHtml(x)}</code>`).join(', ');
  const deps = (f.depends_on || []).map(x => `<code>${escapeHtml(x)}</code>`).join(', ');
  const usedBy = (f.used_by || []).map(x => `<code>${escapeHtml(x)}</code>`).join(', ');
  return `
    <label class="feature" data-id="${f.id}" data-gslug="${slug(f.group)}">
      <input type="checkbox" ${state[f.id] ? 'checked' : ''} onchange="onToggle('${f.id}')">
      <div class="f-body">
        <div class="f-name">${escapeHtml(f.name_pt || f.name)}</div>
        ${f.name_pt && f.name_pt !== f.name ? `<div class="f-name-en">${escapeHtml(f.name)}</div>` : ''}
        <div class="f-desc">${escapeHtml(f.desc_pt || f.desc || '')}</div>
        ${f.desc_pt && f.desc ? `<div class="f-desc-en">EN: ${escapeHtml(f.desc)}</div>` : ''}
        <div class="f-id">${f.id}</div>
        ${(files || entries || deps || usedBy) ? `
          <details class="f-meta">
            <summary>detalhes</summary>
            <div class="f-meta-content">
              ${files ? `<div><span class="label">arquivos:</span> ${files}</div>` : ''}
              ${entries ? `<div><span class="label">entradas:</span> ${entries}</div>` : ''}
              ${deps ? `<div><span class="label">depende de:</span> ${deps}</div>` : ''}
              ${usedBy ? `<div><span class="label">usado por:</span> ${usedBy}</div>` : ''}
            </div>
          </details>
        ` : ''}
      </div>
      <span class="f-flag">${state[f.id] ? 'manter' : 'remover'}</span>
    </label>
  `;
}

function onToggle(id) {
  state[id] = !state[id];
  applyState(id);
  updateCounters();
  checkDependencyWarnings();
}

function applyState(id) {
  const el = document.querySelector(`[data-id="${id}"]`);
  if (!el) return;
  el.classList.toggle('to-remove', !state[id]);
  el.querySelector('.f-flag').textContent = state[id] ? 'manter' : 'remover';
}

function toggleAll(keep) {
  Object.keys(state).forEach(id => { state[id] = keep; });
  document.querySelectorAll('.feature').forEach(el => {
    const id = el.dataset.id;
    el.querySelector('input[type=checkbox]').checked = keep;
    applyState(id);
  });
  updateCounters();
  checkDependencyWarnings();
}

function toggleGroup(gslug, keep) {
  document.querySelectorAll(`[data-gslug="${gslug}"]`).forEach(el => {
    const id = el.dataset.id;
    state[id] = keep;
    el.querySelector('input[type=checkbox]').checked = keep;
    applyState(id);
  });
  updateCounters();
  checkDependencyWarnings();
}

function expandAll(open) {
  document.querySelectorAll('details.group').forEach(d => { d.open = open; });
}

function updateCounters() {
  const ids = Object.keys(state);
  const keep = ids.filter(id => state[id]).length;
  const remove = ids.length - keep;
  document.getElementById('cTotal').textContent = `Total: ${ids.length}`;
  document.getElementById('cKeep').textContent = `Manter: ${keep}`;
  document.getElementById('cRemove').textContent = `Remover: ${remove}`;
}

function checkDependencyWarnings() {
  const removeIds = new Set(Object.keys(state).filter(id => !state[id]));
  const keepIds = new Set(Object.keys(state).filter(id => state[id]));
  const warnings = [];
  INVENTORY.groups.forEach(g => g.features.forEach(f => {
    if (keepIds.has(f.id) && Array.isArray(f.depends_on)) {
      f.depends_on.forEach(dep => {
        if (removeIds.has(dep)) warnings.push({ feature: f.id, name: f.name, missing: dep });
      });
    }
  }));
  const banner = document.getElementById('warnBanner');
  if (warnings.length === 0) {
    banner.classList.remove('show');
    return;
  }
  const list = warnings.slice(0, 8).map(w =>
    `<code>${w.name}</code> (mantida) depende de <code>${w.missing}</code> (removida)`
  ).join('<br>');
  banner.innerHTML = `<strong>⚠ ${warnings.length} dependência(s) quebrada(s):</strong><br>${list}${warnings.length > 8 ? '<br>…' : ''}`;
  banner.classList.add('show');
}

function openExport() {
  const ids = Object.keys(state);
  const out = {
    version: '3.1.3',
    generated: new Date().toISOString(),
    totals: {
      total: ids.length,
      keep: ids.filter(id => state[id]).length,
      remove: ids.filter(id => !state[id]).length,
    },
    keep: ids.filter(id => state[id]).sort(),
    remove: ids.filter(id => !state[id]).sort(),
  };
  document.getElementById('exportJson').value = JSON.stringify(out, null, 2);
  document.getElementById('exportModal').classList.add('open');
}
function closeExport() { document.getElementById('exportModal').classList.remove('open'); }

function copyExport() {
  const ta = document.getElementById('exportJson');
  ta.select();
  document.execCommand('copy');
  toast('Copiado para clipboard');
}

function downloadExport() {
  const blob = new Blob([document.getElementById('exportJson').value], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `vmix-layer-control-audit-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Download iniciado');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 1800);
}

function slug(s) { return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }
function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeExport();
});

render();
</script>
</body>
</html>
